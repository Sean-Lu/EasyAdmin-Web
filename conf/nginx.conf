#        add_header 'Access-Control-Allow-Headers' 'Authorization,AppInfo,Sign,X-Requested-With,X-Forwarded-For,X-Real-IP,*';
#        add_header Content-Security-Policy upgrade-insecure-requests;
#    }

    location /api/ { ## 后端项目
        proxy_pass http://easyadmin-api:9001; ## 重要！！！proxy_pass 需要设置为后端项目所在服务器的 IP
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600;
        proxy_read_timeout 600;
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' '*';
        add_header 'Access-Control-Allow-Headers' 'Authorization,AppInfo,Sign,X-Requested-With,X-Forwarded-For,X-Real-IP,*';
        add_header Content-Security-Policy upgrade-insecure-requests;
    }

    location / { ## 前端项目
        root   /usr/share/nginx/html/easyadmin;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
